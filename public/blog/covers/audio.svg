<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380">
  <rect width="720" height="380" fill="#F5F3EF"/>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="1" fill="#E8E4DE"/>
  </pattern>
  <rect width="720" height="380" fill="url(#dots)"/>

  <!-- Waveform player card -->
  <rect x="96" y="80" width="528" height="220" rx="12" fill="white" stroke="#E8E4DE" stroke-width="1.5"/>

  <!-- Player header -->
  <rect x="96" y="80" width="528" height="48" rx="12" fill="#111110"/>
  <rect x="96" y="104" width="528" height="24" fill="#111110"/>
  <circle cx="130" cy="104" r="12" fill="#E84827"/>
  <!-- Speaker icon in circle -->
  <path d="M126,100 L126,108 L130,108 L135,112 L135,96 L130,100 Z" fill="white"/>
  <text x="152" y="109" font-family="system-ui, sans-serif" font-size="13" fill="white" font-weight="600">recuerdo-verano.mp3</text>
  <text x="600" y="109" font-family="system-ui, monospace" font-size="12" fill="#706C66" text-anchor="end">3:12</text>

  <!-- Waveform bars centered at y=190 -->
  <!-- Far left (very quiet) -->
  <rect x="116" y="184" width="7" height="12" rx="3.5" fill="#E8E4DE"/>
  <rect x="128" y="180" width="7" height="20" rx="3.5" fill="#E8E4DE"/>
  <rect x="140" y="177" width="7" height="26" rx="3.5" fill="#D4D0C9"/>
  <rect x="152" y="172" width="7" height="36" rx="3.5" fill="#D4D0C9"/>
  <rect x="164" y="168" width="7" height="44" rx="3.5" fill="#A8A49E"/>
  <rect x="176" y="162" width="7" height="56" rx="3.5" fill="#A8A49E"/>

  <!-- Building up (teal) -->
  <rect x="188" y="155" width="7" height="70" rx="3.5" fill="#0BBFB0" opacity="0.6"/>
  <rect x="200" y="148" width="7" height="84" rx="3.5" fill="#0BBFB0" opacity="0.75"/>
  <rect x="212" y="140" width="7" height="100" rx="3.5" fill="#0BBFB0" opacity="0.85"/>
  <rect x="224" y="133" width="7" height="114" rx="3.5" fill="#0BBFB0"/>

  <!-- Peak (coral) -->
  <rect x="236" y="122" width="7" height="136" rx="3.5" fill="#E84827"/>
  <rect x="248" y="110" width="7" height="160" rx="3.5" fill="#E84827"/>
  <rect x="260" y="102" width="7" height="176" rx="3.5" fill="#E84827"/>
  <rect x="272" y="96" width="7" height="188" rx="3.5" fill="#E84827"/>
  <rect x="284" y="102" width="7" height="176" rx="3.5" fill="#E84827"/>
  <rect x="296" y="112" width="7" height="156" rx="3.5" fill="#E84827"/>

  <!-- Playhead position line -->
  <line x1="307" y1="130" x2="307" y2="250" stroke="#E84827" stroke-width="2" opacity="0.4"/>

  <!-- After playhead (grayed out - not yet played) -->
  <rect x="308" y="118" width="7" height="144" rx="3.5" fill="#D4D0C9"/>
  <rect x="320" y="128" width="7" height="124" rx="3.5" fill="#D4D0C9"/>
  <rect x="332" y="138" width="7" height="104" rx="3.5" fill="#D4D0C9"/>
  <rect x="344" y="145" width="7" height="90" rx="3.5" fill="#D4D0C9"/>
  <rect x="356" y="152" width="7" height="76" rx="3.5" fill="#D4D0C9"/>
  <rect x="368" y="160" width="7" height="60" rx="3.5" fill="#D4D0C9"/>
  <rect x="380" y="165" width="7" height="50" rx="3.5" fill="#E8E4DE"/>
  <rect x="392" y="170" width="7" height="40" rx="3.5" fill="#E8E4DE"/>
  <rect x="404" y="174" width="7" height="32" rx="3.5" fill="#E8E4DE"/>
  <rect x="416" y="177" width="7" height="26" rx="3.5" fill="#E8E4DE"/>
  <rect x="428" y="180" width="7" height="20" rx="3.5" fill="#E8E4DE"/>
  <rect x="440" y="183" width="7" height="14" rx="3.5" fill="#E8E4DE"/>

  <!-- More quiet right side -->
  <rect x="452" y="177" width="7" height="26" rx="3.5" fill="#A8A49E"/>
  <rect x="464" y="168" width="7" height="44" rx="3.5" fill="#A8A49E"/>
  <rect x="476" y="162" width="7" height="56" rx="3.5" fill="#D4D0C9"/>
  <rect x="488" y="155" width="7" height="70" rx="3.5" fill="#D4D0C9"/>
  <rect x="500" y="163" width="7" height="54" rx="3.5" fill="#E8E4DE"/>
  <rect x="512" y="170" width="7" height="40" rx="3.5" fill="#E8E4DE"/>
  <rect x="524" y="175" width="7" height="30" rx="3.5" fill="#E8E4DE"/>
  <rect x="536" y="180" width="7" height="20" rx="3.5" fill="#E8E4DE"/>
  <rect x="548" y="183" width="7" height="14" rx="3.5" fill="#E8E4DE"/>
  <rect x="560" y="184" width="7" height="12" rx="3.5" fill="#E8E4DE"/>

  <!-- Time labels -->
  <text x="116" y="264" font-family="system-ui, monospace" font-size="11" fill="#A8A49E">0:00</text>
  <text x="360" y="264" font-family="system-ui, monospace" font-size="11" fill="#E84827" text-anchor="middle">1:28</text>
  <text x="604" y="264" font-family="system-ui, monospace" font-size="11" fill="#A8A49E" text-anchor="end">3:12</text>

  <!-- Controls bar -->
  <rect x="96" y="270" width="528" height="30" rx="0" fill="white"/>
  <line x1="96" y1="270" x2="624" y2="270" stroke="#F0EDE6" stroke-width="1"/>

  <!-- Rewind button -->
  <g transform="translate(320, 280)">
    <polygon points="0,0 -10,5 0,10" fill="#706C66"/>
    <polygon points="-10,0 -20,5 -10,10" fill="#706C66"/>
  </g>

  <!-- Play/Pause button -->
  <circle cx="360" cy="285" r="18" fill="#E84827"/>
  <rect x="354" y="278" width="5" height="14" rx="2.5" fill="white"/>
  <rect x="362" y="278" width="5" height="14" rx="2.5" fill="white"/>

  <!-- Forward button -->
  <g transform="translate(398, 280)">
    <polygon points="0,0 10,5 0,10" fill="#706C66"/>
    <polygon points="10,0 20,5 10,10" fill="#706C66"/>
  </g>
</svg>
