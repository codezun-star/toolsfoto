<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380">
  <!-- Background -->
  <rect width="720" height="380" fill="#F5F3EF"/>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="1" fill="#E8E4DE"/>
  </pattern>
  <rect width="720" height="380" fill="url(#dots)"/>

  <!-- Shadow card -->
  <rect x="128" y="93" width="302" height="218" rx="10" fill="#E8E4DE"/>

  <!-- Main photo card -->
  <rect x="122" y="86" width="302" height="218" rx="10" fill="white" stroke="#E8E4DE" stroke-width="1.5"/>

  <!-- Photo content clipped -->
  <clipPath id="photoClip">
    <rect x="136" y="100" width="274" height="158" rx="6"/>
  </clipPath>
  <g clip-path="url(#photoClip)">
    <rect x="136" y="100" width="274" height="80" fill="#D8F2EE"/>
    <rect x="136" y="180" width="274" height="78" fill="#EEF8F2"/>
    <polygon points="136,258 210,148 284,258" fill="#0BBFB0" opacity="0.8"/>
    <polygon points="238,258 316,132 394,258" fill="#5A9E7A" opacity="0.7"/>
    <polygon points="330,258 392,158 454,258" fill="#0BBFB0" opacity="0.45"/>
    <circle cx="388" cy="122" r="30" fill="#E84827" opacity="0.85"/>
    <circle cx="388" cy="122" r="44" fill="#E84827" opacity="0.12"/>
  </g>

  <!-- Photo toolbar -->
  <rect x="136" y="260" width="274" height="34" rx="0" fill="#FAFAF9"/>
  <line x1="136" y1="260" x2="410" y2="260" stroke="#E8E4DE" stroke-width="1"/>
  <text x="156" y="282" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#706C66">paisaje.jpg</text>
  <rect x="367" y="269" width="34" height="17" rx="3" fill="#E84827"/>
  <text x="384" y="282" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="700">JPG</text>

  <!-- Stats panel -->
  <rect x="492" y="96" width="162" height="218" rx="10" fill="white" stroke="#E8E4DE" stroke-width="1.5"/>

  <text x="573" y="127" font-family="system-ui, sans-serif" font-size="10" fill="#A8A49E" text-anchor="middle" letter-spacing="1.5" font-weight="600">ANTES</text>
  <text x="573" y="158" font-family="system-ui, sans-serif" font-size="28" fill="#111110" text-anchor="middle" font-weight="800">4.2 MB</text>

  <line x1="573" y1="168" x2="573" y2="208" stroke="#E84827" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="566,202 573,218 580,202" fill="#E84827"/>

  <rect x="538" y="176" width="70" height="22" rx="11" fill="#FEF0ED"/>
  <text x="573" y="191" font-family="system-ui, sans-serif" font-size="12" fill="#E84827" text-anchor="middle" font-weight="700">− 94%</text>

  <text x="573" y="234" font-family="system-ui, sans-serif" font-size="10" fill="#A8A49E" text-anchor="middle" letter-spacing="1.5" font-weight="600">DESPUÉS</text>
  <text x="573" y="262" font-family="system-ui, sans-serif" font-size="28" fill="#E84827" text-anchor="middle" font-weight="800">258 KB</text>

  <circle cx="573" cy="288" r="14" fill="#EEF8F2"/>
  <path d="M565,288 L570,294 L581,280" stroke="#5A9E7A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
